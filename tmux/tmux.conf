# Set prefix to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Split panes using standard % and " but opening in the current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigate panes using h, j, k, l (matching Vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Zoom pane
bind z resize-pane -Z

# Switch windows relative
bind p previous-window
bind n next-window

# Close pane/window without confirmation
bind x kill-pane

# Set status bar colors to match Cyberdream theme (dark background, cyan active window)
set -g status-style bg='#16181a',fg='#7b8496'
set -g window-status-current-style bg='#25282e',fg='#5ef1ff',bold
set -g pane-border-style fg='#3c4048'
set -g pane-active-border-style fg='#5ef1ff'
