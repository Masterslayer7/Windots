# Starship Configuration: Style A (Powerline Pill)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#083d44)$username$hostname$directory[](#083d44)\
$git_branch$git_status\
$c$elixir$elm$golang$haskell$java$julia$nodejs$rust$scala$python$docker_context\
$fill$cmd_duration$status
$character"""

add_newline = true

[character]
success_symbol = "[ ❯ ](bold #49e9a6)"
error_symbol = "[ ❯ ](bold #e66533)"

[directory]
style = "bg:#083d44 fg:#ffffff"
format = "[$path]($style)"
truncation_length = 3
truncate_to_repo = true

[username]
style_user = "bg:#083d44 fg:#49d6e9 bold"
style_root = "bg:#083d44 fg:#e66533 bold"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = true
style = "bg:#083d44 fg:#e4b781 bold"
format = "[@$hostname]($style)"
disabled = false

[git_branch]
symbol = " "
style = "fg:#df769b"
format = " [](#0c5861)[$symbol$branch](bg:#0c5861 fg:#ffffff)[](#0c5861)"

[git_status]
style = "fg:#e66533"
format = "([](#13221b)[$all_status$ahead_behind](bg:#13221b $style)[](#13221b) )"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
added = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 1000
style = "fg:#e4b781"
format = "took [$duration]($style) "

[status]
disabled = false
format = "[$symbol $status]($style)"
symbol = "✘"
style = "bold #e66533"

[nodejs]
symbol = " "
style = "fg:#49e9a6"
format = "via [$symbol($version)]($style) "

[golang]
symbol = " "
style = "fg:#49d6e9"
format = "via [$symbol($version)]($style) "

[rust]
symbol = " "
style = "fg:#e69533"
format = "via [$symbol($version)]($style) "

[python]
symbol = " "
style = "fg:#e4b781"
format = "via [$symbol($version)]($style) "

[docker_context]
symbol = " "
style = "fg:#49ace9"
format = "via [$symbol$context]($style) "
