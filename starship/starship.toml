# Starship Configuration: Style B (Neon Minimalist)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username$hostname$directory$git_branch$git_status$c$elixir$elm$golang$haskell$java$julia$nodejs$rust$scala$python$docker_context$aws$gcloud$env_var
$character"""

right_format = """$cmd_duration$status"""

add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
added = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 1000
style = "bold yellow"
format = "took [$duration]($style) "

[username]
style_user = "bold cyan"
style_root = "black bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "@[$hostname](bold yellow) "
disabled = false

[status]
disabled = false
format = "[$symbol $status]($style)"
symbol = "✘"
style = "bold red"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version)]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol($version)]($style) "

[rust]
symbol = " "
style = "bold orange"
format = "via [$symbol($version)]($style) "

[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol($version)]($style) "

[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "
